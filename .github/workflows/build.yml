name: Build APK (JNI)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── مرحله ۱: Build Go .so برای هر ABI ──────────────────────────────────────
  build-so:
    name: .so (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            goarch: arm64
            goarm: ""
            triple: aarch64-linux-android
            api: 21
          - abi: armeabi-v7a
            goarch: arm
            goarm: "7"
            triple: armv7a-linux-androideabi
            api: 21
          - abi: x86_64
            goarch: amd64
            goarm: ""
            triple: x86_64-linux-android
            api: 21

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Android NDK
        id: ndk
        run: |
          NDK_VERSION="r26d"
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
          wget -q "https://dl.google.com/android/repository/${NDK_ZIP}"
          unzip -q "${NDK_ZIP}"
          NDK_HOME="$(pwd)/android-ndk-${NDK_VERSION}"
          TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "NDK_HOME=${NDK_HOME}" >> $GITHUB_ENV
          echo "TOOLCHAIN=${TOOLCHAIN}" >> $GITHUB_ENV
          # FIX: نام دقیق CC برای هر triple
          CC="${TOOLCHAIN}/${{ matrix.triple }}${{ matrix.api }}-clang"
          echo "CC=${CC}" >> $GITHUB_ENV
          ls "${TOOLCHAIN}/${{ matrix.triple }}"* | head -3

      - name: Build libflowdriver.so
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build \
            -buildmode=c-shared \
            -ldflags="-s -w" \
            -o "libflowdriver.so" \
            ./cmd/android

          ls -lh libflowdriver.so

      - uses: actions/upload-artifact@v4
        with:
          name: so-${{ matrix.abi }}
          path: libflowdriver.so

  # ── مرحله ۲: Build APK ──────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    needs: build-so
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # دانلود gradle-wrapper.jar از Gradle releases
      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          # دانلود از GitHub Gradle releases (آدرس معتبر)
          curl -fsSL \
            "https://github.com/gradle/gradle/releases/download/v8.4.0/gradle-8.4-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          # Fallback: از services.gradle.org
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.4-bin.zip" \
            -o /tmp/gradle.zip && \
          unzip -j /tmp/gradle.zip "*/lib/gradle-launcher-*.jar" -d /tmp/glibs/ && \
          cp /tmp/glibs/*.jar gradle/wrapper/gradle-wrapper.jar || true

          # اگه هیچکدام کار نکرد، از gradle/actions استفاده می‌کنیم
          ls -lh gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo "jar not found, will use setup-gradle"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - uses: actions/download-artifact@v4
        with:
          pattern: so-*
          path: so-artifacts

      - name: Copy .so to jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          cp so-artifacts/so-arm64-v8a/libflowdriver.so   app/src/main/jniLibs/arm64-v8a/
          cp so-artifacts/so-armeabi-v7a/libflowdriver.so app/src/main/jniLibs/armeabi-v7a/
          cp so-artifacts/so-x86_64/libflowdriver.so      app/src/main/jniLibs/x86_64/
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          cp app/build/outputs/apk/debug/app-debug.apk FlowDriver-${VERSION}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlowDriver-APK
          path: FlowDriver-*.apk

  # ── مرحله ۳: PC binaries ────────────────────────────────────────────────────
  build-pc:
    name: PC (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            name: client_windows.exe
            cmd: ./cmd/client
          - goos: linux
            goarch: amd64
            name: server_linux
            cmd: ./cmd/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w" -o ${{ matrix.name }} ${{ matrix.cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: pc-${{ matrix.name }}
          path: ${{ matrix.name }}

  # ── مرحله ۴: Release ────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [build-apk, build-pc]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FlowDriver-*.apk
            artifacts/client_*
            artifacts/server_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
