name: Build APK (JNI)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── مرحله ۱: Build Go به عنوان .so برای هر ABI ──────────────────────────────
  build-go-jni:
    name: Go JNI (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            goarch: arm64
            goarm: ""
            cc: aarch64-linux-android21-clang
          - abi: armeabi-v7a
            goarch: arm
            goarm: "7"
            cc: armv7a-linux-androideabi21-clang
          - abi: x86_64
            goarch: amd64
            goarm: ""
            cc: x86_64-linux-android21-clang

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Android NDK
        run: |
          ANDROID_NDK_VERSION="r26d"
          wget -q "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip"
          unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
          echo "NDK_HOME=$(pwd)/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_TOOLCHAIN=$(pwd)/android-ndk-${ANDROID_NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Build .so
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          export CC="${{ env.NDK_TOOLCHAIN }}/${{ matrix.cc }}"
          export CXX="${{ env.NDK_TOOLCHAIN }}/${{ matrix.cc }}++"

          go build \
            -buildmode=c-shared \
            -ldflags="-s -w" \
            -o "libflowdriver.so" \
            ./cmd/android

      - uses: actions/upload-artifact@v4
        with:
          name: jni-${{ matrix.abi }}
          path: libflowdriver.so

  # ── مرحله ۲: Build APK ──────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    needs: build-go-jni
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      # کپی .so به jniLibs
      - uses: actions/download-artifact@v4
        with:
          pattern: jni-*
          path: jni-artifacts

      - name: Copy .so files to jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          cp jni-artifacts/jni-arm64-v8a/libflowdriver.so   app/src/main/jniLibs/arm64-v8a/
          cp jni-artifacts/jni-armeabi-v7a/libflowdriver.so app/src/main/jniLibs/armeabi-v7a/
          cp jni-artifacts/jni-x86_64/libflowdriver.so      app/src/main/jniLibs/x86_64/
          echo "JNI libs:"
          find app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          cp app/build/outputs/apk/debug/app-debug.apk FlowDriver-${VERSION}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlowDriver-APK
          path: FlowDriver-*.apk

  # ── مرحله ۳: PC binaries + Release ─────────────────────────────────────────
  build-pc:
    name: PC (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            name: client_windows.exe
            cmd: ./cmd/client
          - goos: linux
            goarch: amd64
            name: server_linux
            cmd: ./cmd/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w" -o ${{ matrix.name }} ${{ matrix.cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: pc-${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Release
    needs: [build-apk, build-pc]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FlowDriver-*.apk
            artifacts/client_*
            artifacts/server_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
