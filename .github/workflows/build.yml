name: Build APK + Go Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── مرحله ۱: Build Go binaries ────────────────────────────────────────────
  build-go:
    name: Go (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            name: client_arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            name: client_arm32
          - goos: linux
            goarch: amd64
            name: client_x86_64
          - goos: windows
            goarch: amd64
            name: client_windows.exe
          - goos: linux
            goarch: amd64
            name: server_linux
            server: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: |
          if [ "${{ matrix.server }}" = "true" ]; then
            go build -ldflags="-s -w" -o ${{ matrix.name }} ./cmd/server
          else
            go build -ldflags="-s -w" -o ${{ matrix.name }} ./cmd/client
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.name }}
          path: ${{ matrix.name }}

  # ── مرحله ۲: Build APK ────────────────────────────────────────────────────
  build-apk:
    name: Build Android APK
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # FIX: دانلود gradle-wrapper.jar معتبر — جایگزین فایل خالی در ریپو
      - name: Fix gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - uses: actions/download-artifact@v4
        with:
          pattern: go-client_*
          path: binaries
          merge-multiple: true

      - name: Copy binaries to assets
        run: |
          mkdir -p app/src/main/assets
          for f in binaries/client_*; do
            name=$(basename "$f")
            cp "$f" "app/src/main/assets/$name"
            chmod +x "app/src/main/assets/$name"
            echo "Copied: $name"
          done
          ls -lh app/src/main/assets/

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          cp app/build/outputs/apk/debug/app-debug.apk FlowDriver-${VERSION}.apk
          echo "APK: FlowDriver-${VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: FlowDriver-APK
          path: FlowDriver-*.apk

  # ── مرحله ۳: Release ──────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-go, build-apk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FlowDriver-*.apk
            artifacts/client_*
            artifacts/server_*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
