name: Build APK (JNI)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-so:
    name: .so (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64-v8a
            goarch: arm64
            goarm: ""
            cc_pattern: "aarch64-linux-android*-clang"
          - abi: armeabi-v7a
            goarch: arm
            goarm: "7"
            cc_pattern: "armv7a-linux-androideabi*-clang"
          - abi: x86_64
            goarch: amd64
            goarm: ""
            cc_pattern: "x86_64-linux-android*-clang"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install NDK
        run: |
          NDK_VER="r26d"
          wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VER}-linux.zip"
          unzip -q "android-ndk-${NDK_VER}-linux.zip"
          TOOLCHAIN="$(pwd)/android-ndk-${NDK_VER}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "TOOLCHAIN=${TOOLCHAIN}" >> $GITHUB_ENV
          CC=$(ls ${TOOLCHAIN}/${{ matrix.cc_pattern }} | head -1)
          echo "CC=${CC}" >> $GITHUB_ENV
          echo "Found CC: ${CC}"

      - name: Build .so
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          # FIX: بدون -s -w تا debug info محفوظ بمونه و crash نکنه
          go build \
            -buildmode=c-shared \
            -o libflowdriver.so \
            ./cmd/android
          ls -lh libflowdriver.so

      - uses: actions/upload-artifact@v4
        with:
          name: so-${{ matrix.abi }}
          path: libflowdriver.so

  build-apk:
    name: Build APK
    needs: build-so
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - uses: actions/download-artifact@v4
        with:
          pattern: so-*
          path: so-artifacts

      - name: Copy .so to jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          cp so-artifacts/so-arm64-v8a/libflowdriver.so   app/src/main/jniLibs/arm64-v8a/
          cp so-artifacts/so-armeabi-v7a/libflowdriver.so app/src/main/jniLibs/armeabi-v7a/
          cp so-artifacts/so-x86_64/libflowdriver.so      app/src/main/jniLibs/x86_64/
          find app/src/main/jniLibs -name "*.so" | xargs ls -lh

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          cp app/build/outputs/apk/debug/app-debug.apk FlowDriver-${VERSION}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: FlowDriver-APK
          path: FlowDriver-*.apk

  build-pc:
    name: PC (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            name: client_windows.exe
            cmd: ./cmd/client
          - goos: linux
            goarch: amd64
            name: server_linux
            cmd: ./cmd/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w" -o ${{ matrix.name }} ${{ matrix.cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: pc-${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Release
    needs: [build-apk, build-pc]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FlowDriver-*.apk
            artifacts/client_*
            artifacts/server_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
